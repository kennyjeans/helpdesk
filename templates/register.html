{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="card" style="max-width: 550px; margin: 0 auto;">
    <h2 style="text-align: center;">📝 Регистрация</h2>

    <form method="POST">
        <div class="form-group">
            <label>👤 Логин (для входа)</label>
            <input type="text" name="username" class="form-control" required
                   value="{{ request.form.username or '' }}">
            <small class="text-muted">Только латинские буквы и цифры</small>
        </div>

        <div class="form-group">
            <label>📧 Email</label>
            <input type="email" name="email" class="form-control" required
                   value="{{ request.form.email or '' }}">
        </div>

        <div class="form-group">
            <label>🔒 Пароль</label>
            <input type="password" name="password" id="password" class="form-control" required
                   minlength="7">
            <div class="password-requirements" style="font-size: 12px; margin-top: 8px;">
                <div id="req-length" class="req-item">❌ Минимум 7 символов</div>
                <div id="req-upper" class="req-item">❌ Заглавная буква (A-Z)</div>
                <div id="req-lower" class="req-item">❌ Строчная буква (a-z)</div>
                <div id="req-digit" class="req-item">❌ Цифра (0-9)</div>
            </div>
        </div>

        <hr>

        <div class="form-group">
            <label>📝 Фамилия</label>
            <input type="text" name="last_name" class="form-control" required
                   value="{{ request.form.last_name or '' }}">
        </div>

        <div class="form-group">
            <label>📝 Имя</label>
            <input type="text" name="first_name" class="form-control" required
                   value="{{ request.form.first_name or '' }}">
        </div>

        <div class="form-group">
            <label>📝 Отчество</label>
            <input type="text" name="middle_name" class="form-control"
                   value="{{ request.form.middle_name or '' }}">
        </div>

        <div class="form-group">
            <label>💼 Должность</label>
            <input type="text" name="post" class="form-control" required
                   value="{{ request.form.post or '' }}">
        </div>

        <div class="form-group">
            <label>📱 Номер телефона</label>
            <input type="tel" name="phone" class="form-control" required
                   value="{{ request.form.phone or '' }}" placeholder="79012345678">
            <small class="text-muted">Только цифры, первая цифра 7 или 8</small>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Зарегистрироваться</button>
    </form>

    <p style="text-align: center; margin-top: 20px;">
        Уже есть аккаунт? <a href="{{ url_for('login') }}">Войдите</a>
    </p>
</div>

<style>
    .password-requirements {
        /*background: #e3e3e3;*/
        padding: 10px;
        border-radius: 8px;
        margin-top: 5px;
    }
    .req-item {
        margin: 3px 0;
        font-size: 12px;
    }
    .req-item.valid {
        color: #10b981;
    }
    .req-item.invalid {
        color: #ef4444;
    }
</style>

<script>
    const passwordInput = document.getElementById('password');
    const reqLength = document.getElementById('req-length');
    const reqUpper = document.getElementById('req-upper');
    const reqLower = document.getElementById('req-lower');
    const reqDigit = document.getElementById('req-digit');

    passwordInput.addEventListener('input', function() {
        const password = this.value;

        // Проверка длины (минимум 7 символов)
        if (password.length >= 7) {
            reqLength.innerHTML = '✅ Минимум 7 символов';
            reqLength.classList.add('valid');
            reqLength.classList.remove('invalid');
        } else {
            reqLength.innerHTML = '❌ Минимум 7 символов (сейчас ' + password.length + ')';
            reqLength.classList.add('invalid');
            reqLength.classList.remove('valid');
        }

        // Проверка на заглавную букву
        if (/[A-ZА-ЯЁ]/.test(password)) {
            reqUpper.innerHTML = '✅ Заглавная буква';
            reqUpper.classList.add('valid');
            reqUpper.classList.remove('invalid');
        } else {
            reqUpper.innerHTML = '❌ Заглавная буква (A-Z, А-Я)';
            reqUpper.classList.add('invalid');
            reqUpper.classList.remove('valid');
        }

        // Проверка на строчную букву
        if (/[a-zа-яё]/.test(password)) {
            reqLower.innerHTML = '✅ Строчная буква';
            reqLower.classList.add('valid');
            reqLower.classList.remove('invalid');
        } else {
            reqLower.innerHTML = '❌ Строчная буква (a-z, а-я)';
            reqLower.classList.add('invalid');
            reqLower.classList.remove('valid');
        }

        // Проверка на цифру
        if (/\d/.test(password)) {
            reqDigit.innerHTML = '✅ Цифра';
            reqDigit.classList.add('valid');
            reqDigit.classList.remove('invalid');
        } else {
            reqDigit.innerHTML = '❌ Цифра (0-9)';
            reqDigit.classList.add('invalid');
            reqDigit.classList.remove('valid');
        }
    });
</script>
{% endblock %}
