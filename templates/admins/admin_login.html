{% extends "admins/base_admin.html" %}

{% block title %}Вход администратора{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto; text-align: center;">
    <div style="margin-bottom: 20px;">
        <div style="font-size: 64px;">👑</div>
        <h2 style="margin-top: 10px;">Панель администратора</h2>
        <p class="text-muted">Войдите в систему управления</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>👤 Логин</label>
            <input type="text" name="username" class="form-control" required placeholder="admin" autofocus>
        </div>

        <div class="form-group">
            <label>🔒 Пароль</label>
            <input type="password" name="password" class="form-control" required placeholder="••••••">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
    </form>

    <hr style="margin: 20px 0;">

    <p class="text-muted" style="font-size: 12px;">
        🔑 Тестовые данные: <strong>admin</strong> / <strong>admin123</strong>
    </p>

    <p style="margin-top: 15px;">
        <a href="{{ url_for('index') }}" class="btn btn-outline" style="width: 100%;">← На главную</a>
    </p>
</div>
{% endblock %}
