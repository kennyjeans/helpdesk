{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 30px;">🔐 Вход в систему</h2>

    <form method="POST">
        <div class="form-group">
            <label>👤 Логин или Email</label>
            <input type="text" name="username" class="form-control" required
                   placeholder="Логин или email@example.com">
<!--            <small class="text-muted">Введите ваш логин или email</small>-->
        </div>

        <div class="form-group">
            <label>🔒 Пароль</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
    </form>

    <p style="text-align: center; margin-top: 20px;">
        Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрируйтесь</a>
    </p>

    <hr>
    <p style="text-align: center; font-size: 14px; color: var(--text-muted);">
        🔑 Тестовые данные:<br>
        <strong>Логин:</strong> user / <strong>Email:</strong> user@mosreg.ru<br>
        <strong>Пароль:</strong> user123
    </p>
</div>
{% endblock %}
