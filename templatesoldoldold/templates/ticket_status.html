<!DOCTYPE html>
<html>
<head>
    <title>Статус заявки #{{ ticket.id }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card">
        <div class="card-header">
            <h3>Заявка #{{ ticket.id }}</h3>
            <span class="badge {% if ticket.status == 'Новая' %}bg-warning{% elif ticket.status == 'В работе' %}bg-info{% else %}bg-success{% endif %}">
                    {{ ticket.status }}
                </span>
        </div>
        <div class="card-body">
            <p><strong>Тема:</strong> {{ ticket.subject }}</p>
            <p><strong>Описание:</strong> {{ ticket.description }}</p>
            <p><strong>Создана:</strong> {{ ticket.created_at }}</p>
            {% if ticket.operator_answer %}
            <div class="alert alert-info mt-3">
                <strong>Ответ оператора:</strong><br>
                {{ ticket.operator_answer }}
            </div>
            {% endif %}
            <a href="/static" class="btn btn-primary">Создать новую заявку</a>
        </div>
    </div>
</div>
</body>
</html>
