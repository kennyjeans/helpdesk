<!DOCTYPE html>
<html>
<head>
    <title>Панель оператора - список заявок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Список заявок</h2>
        <a href="/operator/logout" class="btn btn-danger">Выйти</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Пользователь</th>
                <th>Тема</th>
                <th>Статус</th>
                <th>Создана</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            {% for ticket in tickets %}
            <tr>
                <td>{{ ticket.id }}</td>
                <td>{{ ticket.user_name }}<br><small>{{ ticket.user_email }}</small></td>
                <td>{{ ticket.subject }}</td>
                <td>
                            <span class="badge {% if ticket.status == 'Новая' %}bg-warning{% elif ticket.status == 'В работе' %}bg-info{% else %}bg-success{% endif %}">
                                {{ ticket.status }}
                            </span>
                </td>
                <td>{{ ticket.created_at }}</td>
                <td>
                    <a href="/operator/ticket/{{ ticket.id }}" class="btn btn-sm btn-primary">Обработать</a>
                </td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
