<!DOCTYPE html>
<html>
<head>
    <title>Проверка статуса заявки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3>Проверка статуса заявки</h3>
                </div>
                <div class="card-body">
                    <form method="GET" action="/check_ticket">
                        <div class="mb-3">
                            <label class="form-label">Номер заявки</label>
                            <input type="number" name="ticket_id" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ваш Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Проверить</button>
                        <a href="/static" class="btn btn-secondary">Создать заявку</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
