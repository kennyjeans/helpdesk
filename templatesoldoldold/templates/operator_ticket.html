<!DOCTYPE html>
<html>
<head>
    <title>Обработка заявки #{{ ticket.id }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-3">
    <div class="card">
        <div class="card-header">
            <h3>Заявка #{{ ticket.id }}</h3>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <p><strong>Пользователь:</strong> {{ ticket.user_name }}</p>
                    <p><strong>Email:</strong> {{ ticket.user_email }}</p>
                    <p><strong>Тема:</strong> {{ ticket.subject }}</p>
                    <p><strong>Описание:</strong></p>
                    <div class="alert alert-secondary">
                        {{ ticket.description }}
                    </div>
                </div>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Статус</label>
                    <select name="status" class="form-select">
                        <option value="Новая" {% if ticket.status == 'Новая' %}selected{% endif %}>Новая</option>
                        <option value="В работе" {% if ticket.status == 'В работе' %}selected{% endif %}>В работе</option>
                        <option value="Закрыта" {% if ticket.status == 'Закрыта' %}selected{% endif %}>Закрыта</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ответ оператора</label>
                    <textarea name="answer" rows="6" class="form-control">{{ ticket.operator_answer or '' }}</textarea>
                </div>

                <button type="submit" class="btn btn-success">Сохранить изменения</button>
                <a href="/operator/dashboard" class="btn btn-secondary">Назад к списку</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
