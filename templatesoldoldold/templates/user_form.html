<!DOCTYPE html>
<html>
<head>
    <title>Создание заявки в поддержку</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3>Создание заявки в службу поддержки</h3>
                </div>
                <div class="card-body">
                    <form method="POST" action="/create_ticket">
                        <div class="mb-3">
                            <label class="form-label">Ваше имя</label>
                            <input type="text" name="user_name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="user_email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Тема заявки</label>
                            <input type="text" name="subject" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Описание проблемы</label>
                            <textarea name="description" rows="5" class="form-control" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Отправить заявку</button>
                        <a href="/check_ticket" class="btn btn-link">Проверить статус заявки</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
